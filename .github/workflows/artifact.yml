name: Artifacts Workflow
run-name: Artifact Upload and Download
on: push
jobs:
  upload-artifact:
    timeout-minutes: 3
    runs-on: ubuntu-latest
    steps:
      - name: Generate Artifact
        run: date > date.txt
      - uses: actions/upload-artifact@v7
        with:
          name: uploaded
          path: date.txt
          retention-days: 7
  download-artifact:
    timeout-minutes: 3
    runs-on: ubuntu-latest
    needs: [upload-artifact]
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: uploaded
          path: downloaded
      - name: Download Artifact
        run: cat downloaded/date.txt
