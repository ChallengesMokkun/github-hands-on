name: Cache Workflow
run-name: Cache Workflow
on: push
jobs:
  cache-job:
    timeout-minutes: 3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          key: tet-${{ runner.os }}-${{ github.sha }}
          path: ${{ github.workspace }}/dummy
          restore-keys: |
            test-${{ runner.os }}-
      - name: use cache
        run: |
          if [[ -f "$GITHUB_WORKSPACE/dummy" ]]; then exit 0; fi
          dd if=/dev/urandom of="$GITHUB_WORKSPACE/dummy" bs=1M count=10
          sleep 30
      - name: print dir
        run: ls -lh "$GITHUB_WORKSPACE/dummy"
