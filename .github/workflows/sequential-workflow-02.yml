name: Sequential Workflow 02
run-name: Sequential Workflow 02
on: push
jobs:
  before:
    timeout-minutes: 3
    runs-on: ubuntu-latest
    steps:
      - id: define-params
        name: Define Params
        run: echo "result=Hello" >> "$GITHUB_OUTPUT"
    outputs:
      result: ${{ steps.define-params.outputs.result }}
  after:
    timeout-minutes: 3
    runs-on: ubuntu-latest
    needs: [before]
    steps:
      - run: echo "$RESULT"
        env:
          RESULT: ${{ needs.before.outputs.result }}
