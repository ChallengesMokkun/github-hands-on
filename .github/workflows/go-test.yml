name: Golang Unit Test Workflow
run-name: Golang Unit Test on Pull Request
on:
  pull_request:
    paths:
      - go/**
jobs:
  unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: .go-version
      - name: Golang Unit Test
        run: go test -v ./...
