name: Golang test
run-name: Golang Unit test
on:
  pull_request:
    paths: ['go/**/*.go']
jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
      - id: unit_test
        name: golang unit test
        run: go test -v ./...
