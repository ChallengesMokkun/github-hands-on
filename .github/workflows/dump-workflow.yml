name: Dump Workflow
run-name: Dump
on: push
jobs:
  dump:
    timeout-minutes: 3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/dump/
        id: dump
        with:
          enable-context: 'true'
      - name: dump value
        run: echo "$DATE"
        env:
          DATE: ${{ steps.dump.outputs.dumped-date }}
      - name: display pwd
        run: pwd
