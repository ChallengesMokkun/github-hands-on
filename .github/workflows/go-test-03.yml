name: Golang Unit Test
run-name: Golang Unit Test on Pull Request
on:
  pull_request:
    paths:
      - go/**
jobs:
  go-unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
      - name: Go Unit Test
        run: go test -v ./...
