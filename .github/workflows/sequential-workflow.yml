name: Sequential Workflow
run-name: Sequential Workflow jobs
on: push
jobs:
  first-job:
    timeout-minutes: 3
    runs-on: ubuntu-latest
    steps:
      - name: First Job
        run: sleep 10 && echo "First Job"
  second-job:
    timeout-minutes: 3
    runs-on: ubuntu-latest
    needs: [first-job]
    steps:
      - name: Second Job
        run: sleep 10 && echo "Second Job"
  third-job:
    timeout-minutes: 3
    runs-on: ubuntu-latest
    needs: [second-job]
    steps:
      - name: Third Job
        run: sleep 10 && echo "Third Job"
